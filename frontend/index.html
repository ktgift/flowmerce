<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Flowmerce</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* iOS 18 system colors — light */
    --bg: #f5f5f7;
    --bg-elevated: #ffffff;
    --bg-sidebar: #fbfbfd;
    --bg-subtle: #f2f2f7;
    --hairline: rgba(60, 60, 67, 0.12);
    --hairline-strong: rgba(60, 60, 67, 0.22);
    --label: #1c1c1e;
    --label-secondary: rgba(60, 60, 67, 0.72);
    --label-tertiary: rgba(60, 60, 67, 0.5);
    --label-quaternary: rgba(60, 60, 67, 0.28);

    --blue: #007aff;
    --blue-soft: #e5f1ff;
    --green: #34c759;
    --green-soft: #e6f8ec;
    --red: #ff3b30;
    --red-soft: #ffe9e7;
    --orange: #ff9500;
    --orange-soft: #fff2e0;
    --yellow: #ffcc00;
    --indigo: #5856d6;
    --indigo-soft: #ecebfb;
    --purple: #af52de;
    --purple-soft: #f5e9fb;
    --teal: #30b0c7;
    --teal-soft: #e0f4f8;
    --pink: #ff2d55;
    --gray: #8e8e93;
    --gray-2: #aeaeb2;
    --gray-5: #e5e5ea;
    --gray-6: #f2f2f7;

    --radius-xs: 6px;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 22px;
    --radius-2xl: 28px;

    --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 0.5px rgba(0,0,0,0.04);
    --shadow-lift: 0 8px 24px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.06);

    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Noto Sans Thai", system-ui, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Monaco, monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--label);
    font-family: var(--sans);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.01em;
  }
  :lang(th), [lang="th"] {
    font-family: "Noto Sans Thai", var(--sans);
    letter-spacing: 0;
  }
  button { font-family: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }

  /* Scrollbar styling — iOS-thin */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(60,60,67,0.18); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(60,60,67,0.32); background-clip: padding-box; border: 2px solid transparent; }

  #root { min-height: 100vh; }

  /* Reusable atoms */
  .row { display: flex; align-items: center; }
  .col { display: flex; flex-direction: column; }
  .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-5 { gap: 20px; } .gap-6 { gap: 24px; }
  .grow { flex: 1 1 auto; min-width: 0; }
  .mono { font-family: var(--mono); font-feature-settings: normal; letter-spacing: 0; }
  .tabnum { font-variant-numeric: tabular-nums; }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .clickable { cursor: pointer; user-select: none; }

  /* iOS card */
  .card {
    background: var(--bg-elevated);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
  }
  .card-pad { padding: 20px; }

  /* iOS button */
  .ios-btn {
    appearance: none;
    border: none;
    background: var(--blue);
    color: white;
    height: 36px;
    padding: 0 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 590;
    letter-spacing: -0.01em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.08s ease, background 0.15s ease;
  }
  .ios-btn:hover { background: #0a6fe8; }
  .ios-btn:active { transform: scale(0.97); }
  .ios-btn.secondary { background: var(--gray-6); color: var(--label); }
  .ios-btn.secondary:hover { background: #e8e8ed; }
  .ios-btn.ghost { background: transparent; color: var(--blue); }
  .ios-btn.ghost:hover { background: var(--blue-soft); }
  .ios-btn.danger { background: var(--red); }
  .ios-btn.success { background: var(--green); }
  .ios-btn.sm { height: 28px; padding: 0 10px; font-size: 13px; border-radius: 8px; }
  .ios-btn.lg { height: 44px; padding: 0 22px; font-size: 15px; border-radius: 12px; }

  /* iOS input */
  .ios-input {
    appearance: none;
    border: none;
    background: var(--gray-6);
    height: 36px;
    padding: 0 12px;
    border-radius: 10px;
    font-size: 14px;
    width: 100%;
    color: var(--label);
    outline: none;
    transition: box-shadow 0.15s ease;
  }
  .ios-input:focus { box-shadow: 0 0 0 3px rgba(0,122,255,0.18); background: #fff; }
  .ios-input::placeholder { color: var(--label-tertiary); }
  textarea.ios-input { height: auto; padding: 10px 12px; line-height: 1.5; resize: vertical; }

  /* Segmented control */
  .segmented {
    display: inline-flex;
    background: var(--gray-6);
    border-radius: 10px;
    padding: 2px;
    gap: 0;
  }
  .segmented button {
    border: none;
    background: transparent;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--label);
    transition: background 0.15s ease;
  }
  .segmented button.active {
    background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.04);
    font-weight: 590;
  }

  /* Status pill */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    height: 22px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 590;
    letter-spacing: -0.005em;
    line-height: 1;
    white-space: nowrap;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

  /* Table */
  table.ios-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .ios-table th {
    text-align: left;
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--label-tertiary);
    padding: 10px 12px;
    border-bottom: 1px solid var(--hairline);
    background: transparent;
  }
  .ios-table td {
    padding: 12px;
    border-bottom: 1px solid var(--hairline);
    vertical-align: middle;
  }
  .ios-table tbody tr:last-child td { border-bottom: none; }
  .ios-table tbody tr:hover td { background: #fafafc; }

  /* Sidebar */
  .sidebar {
    width: 244px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--hairline);
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    padding: 14px 12px;
    gap: 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 14px;
    color: var(--label);
    cursor: pointer;
    user-select: none;
    transition: background 0.12s ease;
  }
  .nav-item:hover { background: rgba(0,0,0,0.04); }
  .nav-item.active { background: var(--blue-soft); color: var(--blue); font-weight: 590; }
  .nav-item .badge { margin-left: auto; background: var(--blue); color: white; font-size: 11px; padding: 1px 6px; border-radius: 999px; font-weight: 600; }

  .nav-section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--label-tertiary);
    padding: 8px 10px 4px;
    font-weight: 600;
  }

  /* Top bar */
  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--hairline);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  /* Slide-over */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.32);
    z-index: 50;
    opacity: 0;
    animation: fade-in 0.18s ease forwards;
  }
  .sheet {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 480px;
    background: var(--bg-elevated);
    z-index: 51;
    box-shadow: -16px 0 48px rgba(0,0,0,0.18);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    animation: slide-in 0.26s cubic-bezier(0.32, 0.72, 0, 1) forwards;
  }
  .sheet-modal {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: var(--bg-elevated);
    z-index: 51;
    border-radius: 20px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.24);
    min-width: 420px;
    max-width: 560px;
    opacity: 0;
    animation: pop-in 0.22s cubic-bezier(0.32, 0.72, 0, 1) forwards;
  }
  @keyframes fade-in { to { opacity: 1; } }
  @keyframes slide-in { to { transform: translateX(0); } }
  @keyframes pop-in { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } from { transform: translate(-50%, -50%) scale(0.96); } }

  /* Page headings */
  h1.page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
  h2.section-title { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; margin: 0; }
  .eyebrow { font-size: 12px; font-weight: 590; letter-spacing: 0.04em; text-transform: uppercase; color: var(--label-tertiary); }

  /* KPI card */
  .kpi-card { padding: 18px 20px; }
  .kpi-label { font-size: 13px; color: var(--label-secondary); font-weight: 500; }
  .kpi-value { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; margin-top: 4px; font-variant-numeric: tabular-nums; }

  /* Step indicator */
  .step-dot {
    width: 24px; height: 24px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    background: var(--gray-6); color: var(--label-tertiary);
    font-size: 12px; font-weight: 600;
    flex-shrink: 0;
  }
  .step-dot.done { background: var(--green); color: white; }
  .step-dot.active { background: var(--blue); color: white; }

  /* Auto-fill banner */
  .autofill-card {
    background: linear-gradient(180deg, #f0faf3 0%, #ffffff 100%);
    border: 1px solid var(--green-soft);
    border-radius: 14px;
    padding: 16px 18px;
  }

  /* Drag handle */
  .drag-handle {
    color: var(--label-quaternary);
    cursor: grab;
    user-select: none;
    font-size: 14px;
    padding: 0 4px;
  }
  .drag-handle:hover { color: var(--label-secondary); }

  /* Drop zone */
  .dropzone {
    border: 2px dashed var(--hairline-strong);
    background: #fafafc;
    border-radius: 16px;
    padding: 48px;
    text-align: center;
    transition: all 0.18s ease;
  }
  .dropzone.dragging { border-color: var(--blue); background: var(--blue-soft); }

  /* Spark / bars */
  .spark-bar { background: linear-gradient(180deg, var(--blue) 0%, #4ea1ff 100%); border-radius: 4px 4px 0 0; }

  /* link */
  .link { color: var(--blue); text-decoration: none; cursor: pointer; }
  .link:hover { text-decoration: underline; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 56px 24px;
    color: var(--label-secondary);
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    background: rgba(28,28,30,0.92);
    color: white;
    padding: 12px 18px;
    border-radius: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.32);
    font-size: 14px; font-weight: 500;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; gap: 10px;
    animation: toast-in 0.22s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes toast-in { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
